<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>English Learning Path for Developers (មគ្គុទេសក៍រៀនភាសាអង់គ្លេស)</title>
  
  <!-- Premium Style Sheets -->
  <link rel="stylesheet" href="app.css">
  
  <!-- CDN Dependencies -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  
  <!-- Initialize Mermaid configuration -->
  <script>
    mermaid.initialize({
      startOnLoad: false,
      theme: 'dark',
      securityLevel: 'loose'
    });
  </script>
</head>
<body>

  <div id="app" v-cloak>
    <div class="app-container">
      
      <!-- Left Navigation Sidebar -->
      <aside :class="['sidebar', { closed: !isSidebarOpen, 'mobile-open': isMobileMenuOpen }]">
        <div class="sidebar-header">
          <a href="#" class="brand">
            <img class="brand-logo" src="assets/brand_logo.png" alt="CODEenglish Logo">
            <span class="brand-name">CODEenglish</span>
          </a>
          <button @click="toggleSidebar" class="toggle-btn" title="Collapse Sidebar">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
            </svg>
          </button>
        </div>
        
        <nav class="sidebar-content">
          <!-- Sidebar Module list -->
          <div v-for="(mod, modIndex) in sidebarModules" :key="modIndex" class="module-group">
            <div class="module-header">
              <span>{{ mod.title }}</span>
            </div>
            
            <ul class="lesson-list">
              <!-- Module Index link -->
              <li class="lesson-item">
                <a :href="'#/' + mod.path" 
                   :class="['lesson-link', { active: currentPath === mod.path }]"
                   @click="isMobileMenuOpen = false">
                   📖 Index
                </a>
              </li>
              
              <!-- Module Lessons links -->
              <li v-for="(lesson, lesIndex) in mod.lessons" :key="lesIndex" class="lesson-item">
                <a :href="'#/' + lesson.path" 
                   :class="['lesson-link', { active: currentPath === lesson.path }]">
                   📄 {{ lesson.title }}
                </a>
              </li>
            </ul>
          </div>
        </nav>
      </aside>

      <!-- Main Contents wrapper -->
      <div :class="['main-wrapper', { 'sidebar-closed': !isSidebarOpen }]">
        
        <!-- Scroll Progress Bar (Ocular feedback indicator) -->
        <div class="scroll-progress-container">
          <div class="scroll-progress-bar" :style="{ width: scrollProgress + '%' }"></div>
        </div>

        <!-- Navigation Header bar -->
        <header class="top-nav">
          <button @click="toggleSidebar" class="toggle-btn" title="Toggle Navigation Menu">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
          </button>
          
          <div class="top-nav-meta">
            <small style="color: var(--text-muted)">Active Document Path:</small>
            <span style="font-size: 0.85rem; font-family: monospace; color: var(--accent-secondary); margin-left: 0.5rem;">
              {{ currentPath }}
            </span>
          </div>
        </header>

        <!-- Dynamic Page Content -->
        <main class="content-container">
          <!-- Lesson Metadata Card -->
          <div class="lesson-meta-card" v-if="currentPath !== 'README.md'">
            <div class="meta-item">
              <span class="meta-label">Module:</span>
              <span class="meta-value">{{ currentPath.split('/')[0].replace(/^\d+-/, '').replace(/-/g, ' ').toUpperCase() }}</span>
            </div>
            <div class="meta-item">
              <span class="meta-label">Category:</span>
              <span class="meta-value">IT Technical English</span>
            </div>
            <div class="meta-item">
              <span class="meta-label">Audience:</span>
              <span class="meta-value">Software Developers</span>
            </div>
          </div>

          <div v-if="isLoading" class="loader-wrapper">
            <div class="spinner"></div>
          </div>
          
          <article v-else class="markdown-body" v-html="renderedHtml"></article>
        </main>

      </div>
    </div>
  </div>

  <!-- Load ES Module App script -->
  <script type="module" src="app.js"></script>

</body>
</html>
